apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sfa-enduro-worker
  labels:
    app: sfa-enduro-worker
spec:
  serviceName: sfa-enduro-worker
  selector:
    matchLabels:
      app: sfa-enduro-worker
  template:
    metadata:
      labels:
        app: sfa-enduro-worker
    spec:
      serviceAccountName: sdps
      securityContext:
        fsGroup: 1000
      containers:
        - name: sfa-enduro-worker
          image: sfa-enduro-worker:dev
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: SFA_ENDURO_PREPROCESSING_PERSISTENCE_DSN
              value: $(MYSQL_USER):$(MYSQL_PASSWORD)@tcp(mysql.enduro-sdps:3306)/preprocessing_sfa
          volumeMounts:
            - name: config
              mountPath: /home/enduro/.config
              readOnly: true
            - name: shared-dir
              mountPath: /home/enduro/shared
          resources: {}
      volumes:
        - name: config
          secret:
            secretName: sfa-enduro-secret
        - name: shared-dir
          persistentVolumeClaim:
            claimName: preprocessing-pvc
