openapi: 3.0.3
info:
    title: DIPs API
    description: The DIPs API is used to request DIP creation and retrieve DIP details.
    version: 0.1.0
servers:
    - url: http://localhost:80
      description: Default server for DIPs
paths:
    /dips:
        post:
            tags:
                - DIPs
            summary: create DIPs
            description: The create method requests DIP creation for a document key.
            operationId: DIPs#create
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                docKey:
                                    type: string
                                    description: The docKey field contains the document key used to create the DIP.
                                    example: CH-000001
                                    minLength: 1
                            example:
                                docKey: CH-000001
                        example:
                            docKey: CH-000001
            responses:
                "202":
                    description: Accepted response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateDIPResult'
                            example:
                                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                "400":
                    description: 'missing_req_param: Bad Request response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/MissingReqParamError'
                            example:
                                code: 400-03
                                detail: The request is missing an expected query or path parameter.
                                errors:
                                    - detail: The 'docKey' field is required.
                                      parameter: docKey
                                status: 400
                                title: Missing Request Parameter
                                type: https://problems-registry.smartbear.com/missing-request-parameter
                "401":
                    description: 'unauthorized: Unauthorized response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                            example:
                                detail: The request body is missing the docKey field.
                                status: 400
                                title: Invalid request parameters.
                                type: about:blank
                "500":
                    description: 'internal: Internal Server Error response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/InternalError'
                            example:
                                detail: The request body is missing the docKey field.
                                status: 400
                                title: Invalid request parameters.
                                type: about:blank
            security:
                - bearer_header_Authorization: []
    /dips/{id}:
        get:
            tags:
                - DIPs
            summary: show DIPs
            description: The show method retrieves DIP details.
            operationId: DIPs#show
            parameters:
                - name: id
                  in: path
                  description: The id field contains the DIP identifier.
                  required: true
                  schema:
                    type: string
                    description: DIPID uniquely identifies a DIP.
                    example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                    format: uuid
                  example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DIP'
                            example:
                                completed_at: "2026-05-27T15:04:05Z"
                                created_at: "2026-05-27T15:04:05Z"
                                docKey: CH-000001
                                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                                object_key: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                                started_at: "2026-05-27T15:04:05Z"
                                status: done
                "400":
                    description: 'missing_req_param: Bad Request response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/MissingReqParamError'
                            example:
                                code: 400-03
                                detail: The request is missing an expected query or path parameter.
                                errors:
                                    - detail: The 'docKey' field is required.
                                      parameter: docKey
                                status: 400
                                title: Missing Request Parameter
                                type: https://problems-registry.smartbear.com/missing-request-parameter
                "401":
                    description: 'unauthorized: Unauthorized response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                            example:
                                detail: The request body is missing the docKey field.
                                status: 400
                                title: Invalid request parameters.
                                type: about:blank
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/NotFoundError'
                            example:
                                detail: The request body is missing the docKey field.
                                status: 400
                                title: Invalid request parameters.
                                type: about:blank
                "500":
                    description: 'internal: Internal Server Error response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/InternalError'
                            example:
                                detail: The request body is missing the docKey field.
                                status: 400
                                title: Invalid request parameters.
                                type: about:blank
            security:
                - bearer_header_Authorization: []
components:
    schemas:
        CreateDIPResult:
            type: object
            properties:
                id:
                    type: string
                    description: DIPID uniquely identifies a DIP.
                    example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                    format: uuid
            description: CreateDIPResult contains the result of a DIP creation request.
            example:
                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
            required:
                - id
        DIP:
            type: object
            properties:
                completed_at:
                    type: string
                    description: DateTime represents an RFC3339 timestamp.
                    example: "2026-05-27T15:04:05Z"
                    format: date-time
                created_at:
                    type: string
                    description: DateTime represents an RFC3339 timestamp.
                    example: "2026-05-27T15:04:05Z"
                    format: date-time
                docKey:
                    type: string
                    description: DocKey is the document key used to create a DIP.
                    example: CH-000001
                    minLength: 1
                id:
                    type: string
                    description: DIPID uniquely identifies a DIP.
                    example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                    format: uuid
                object_key:
                    type: string
                    description: ObjectKey represents the object store key for a DIP.
                    example: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                    minLength: 1
                started_at:
                    type: string
                    description: DateTime represents an RFC3339 timestamp.
                    example: "2026-05-27T15:04:05Z"
                    format: date-time
                status:
                    type: string
                    description: DIPStatus represents the current status of a DIP.
                    example: done
                    enum:
                        - queued
                        - in progress
                        - done
                        - failed
            description: DIP represents the details of a DIP.
            example:
                completed_at: "2026-05-27T15:04:05Z"
                created_at: "2026-05-27T15:04:05Z"
                docKey: CH-000001
                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                object_key: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                started_at: "2026-05-27T15:04:05Z"
                status: done
            required:
                - id
                - docKey
                - status
                - created_at
        InternalError:
            type: object
            properties:
                detail:
                    type: string
                    description: The detail field contains a human-readable explanation specific to this problem occurrence.
                    example: The request body is missing the docKey field.
                instance:
                    type: string
                    description: The instance field contains a URI reference that identifies this problem occurrence.
                status:
                    type: integer
                    description: The status field contains the HTTP status code generated by the origin server.
                    example: 400
                    format: int32
                title:
                    type: string
                    description: The title field contains a short, human-readable summary of the problem type.
                    example: Invalid request parameters.
                type:
                    type: string
                    description: The type field contains a URI reference that identifies the problem type.
                    default: about:blank
                    example: about:blank
                    format: uri
            description: An internal server error occurred.
            example:
                detail: The request body is missing the docKey field.
                status: 400
                title: Invalid request parameters.
                type: about:blank
            required:
                - type
                - title
                - status
                - detail
        MissingReqParamError:
            type: object
            properties:
                code:
                    type: string
                    description: The code field contains a machine-readable error code.
                    example: 400-03
                detail:
                    type: string
                    description: The detail field contains a human-readable explanation specific to this problem occurrence.
                    example: One or more request parameters are missing.
                errors:
                    type: array
                    items:
                        $ref: '#/components/schemas/ParamError'
                    description: A list of parameter errors.
                    example:
                        - detail: The 'docKey' field is required.
                          parameter: docKey
                status:
                    type: integer
                    description: The status field contains the HTTP status code generated by the origin server.
                    example: 400
                    format: int32
                title:
                    type: string
                    description: The title field contains a short, human-readable summary of the problem type.
                    example: Missing Request Parameter
                type:
                    type: string
                    description: The type field contains a URI reference that identifies the problem type.
                    default: https://problems-registry.smartbear.com/invalid-request-body
                    example: https://problems-registry.smartbear.com/missing-request-parameter
                    format: uri
            description: One or more request parameters are missing.
            example:
                code: 400-03
                detail: The request is missing an expected query or path parameter.
                errors:
                    - detail: The 'docKey' field is required.
                      parameter: docKey
                status: 400
                title: Missing Request Parameter
                type: https://problems-registry.smartbear.com/missing-request-parameter
            required:
                - type
                - title
                - status
                - detail
        NotFoundError:
            type: object
            properties:
                detail:
                    type: string
                    description: The detail field contains a human-readable explanation specific to this problem occurrence.
                    example: The request body is missing the docKey field.
                instance:
                    type: string
                    description: The instance field contains a URI reference that identifies this problem occurrence.
                status:
                    type: integer
                    description: The status field contains the HTTP status code generated by the origin server.
                    example: 400
                    format: int32
                title:
                    type: string
                    description: The title field contains a short, human-readable summary of the problem type.
                    example: Invalid request parameters.
                type:
                    type: string
                    description: The type field contains a URI reference that identifies the problem type.
                    default: about:blank
                    example: about:blank
                    format: uri
            description: The requested resource is not found.
            example:
                detail: The request body is missing the docKey field.
                status: 400
                title: Invalid request parameters.
                type: about:blank
            required:
                - type
                - title
                - status
                - detail
        ParamError:
            type: object
            properties:
                detail:
                    type: string
                    description: The detail field describes the error.
                    example: The 'docKey' field is required.
                parameter:
                    type: string
                    description: The parameter field contains the name of the parameter that caused the error.
                    example: docKey
            description: ParamError represents an error related to a specific request parameter.
            example:
                detail: The 'docKey' field is required.
                parameter: docKey
        ProblemDetails:
            type: object
            properties:
                detail:
                    type: string
                    description: The detail field contains a human-readable explanation specific to this problem occurrence.
                    example: The request body is missing the docKey field.
                instance:
                    type: string
                    description: The instance field contains a URI reference that identifies this problem occurrence.
                status:
                    type: integer
                    description: The status field contains the HTTP status code generated by the origin server.
                    example: 400
                    format: int32
                title:
                    type: string
                    description: The title field contains a short, human-readable summary of the problem type.
                    example: Invalid request parameters.
                type:
                    type: string
                    description: The type field contains a URI reference that identifies the problem type.
                    default: about:blank
                    example: about:blank
                    format: uri
            description: ProblemDetails represents an RFC 9457 problem details object.
            example:
                detail: The request body is missing the docKey field.
                status: 400
                title: Invalid request parameters.
                type: about:blank
            required:
                - type
                - title
                - status
                - detail
        UnauthorizedError:
            type: object
            properties:
                detail:
                    type: string
                    description: The detail field contains a human-readable explanation specific to this problem occurrence.
                    example: The request body is missing the docKey field.
                instance:
                    type: string
                    description: The instance field contains a URI reference that identifies this problem occurrence.
                status:
                    type: integer
                    description: The status field contains the HTTP status code generated by the origin server.
                    example: 400
                    format: int32
                title:
                    type: string
                    description: The title field contains a short, human-readable summary of the problem type.
                    example: Invalid request parameters.
                type:
                    type: string
                    description: The type field contains a URI reference that identifies the problem type.
                    default: about:blank
                    example: about:blank
                    format: uri
            description: The request is unauthorized due to missing or invalid authentication credentials.
            example:
                detail: The request body is missing the docKey field.
                status: 400
                title: Invalid request parameters.
                type: about:blank
            required:
                - type
                - title
                - status
                - detail
    securitySchemes:
        bearer_header_Authorization:
            type: http
            description: 'Authenticate with an access token supplied as Authorization: Bearer [token]. Clients obtain tokens from an external OIDC provider.'
            scheme: bearer
tags:
    - name: DIPs
      description: The DIPs service requests DIP creation and retrieves DIP details.
