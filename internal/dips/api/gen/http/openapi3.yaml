openapi: 3.0.3
info:
    title: DIPs API
    description: The DIPs API is used to request DIP creation and retrieve DIP details.
    version: 0.1.0
servers:
    - url: http://localhost:80
      description: Default server for DIPs
paths:
    /dips:
        post:
            tags:
                - DIPs
            summary: create DIPs
            description: The create method requests DIP creation for a document key.
            operationId: DIPs#create
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                docKey:
                                    type: string
                                    description: The docKey field contains the document key used to create the DIP.
                                    example: CH-000001
                                    minLength: 1
                            example:
                                docKey: CH-000001
                        example:
                            docKey: CH-000001
            responses:
                "202":
                    description: Accepted response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateResponseBody'
                            example:
                                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                "400":
                    description: 'bad_request: Bad Request response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ProblemDetails'
                            example:
                                detail: The request body is missing the docKey field.
                                status: 400
                                title: Bad Request
                                type: about:blank
                "401":
                    description: 'unauthorized: Unauthorized response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ProblemDetails'
                            example:
                                detail: The bearer token is missing or invalid.
                                status: 401
                                title: Unauthorized
                                type: about:blank
                "500":
                    description: 'internal_server_error: Internal Server Error response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ProblemDetails'
                            example:
                                detail: An error occurred when attempting to process the DIP request.
                                status: 500
                                title: Internal Server Error
                                type: about:blank
            security:
                - bearer_header_Authorization: []
    /dips/{id}:
        get:
            tags:
                - DIPs
            summary: show DIPs
            description: The show method retrieves DIP details.
            operationId: DIPs#show
            parameters:
                - name: id
                  in: path
                  description: The id field contains the DIP identifier.
                  required: true
                  schema:
                    type: string
                    description: DIPID uniquely identifies a DIP.
                    example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                    format: uuid
                  example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ShowResponseBody'
                            example:
                                completed_at: "2026-05-27T15:04:05Z"
                                created_at: "2026-05-27T15:04:05Z"
                                docKey: CH-000001
                                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                                object_key: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                                started_at: "2026-05-27T15:04:05Z"
                                status: done
                "401":
                    description: 'unauthorized: Unauthorized response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ProblemDetails'
                            example:
                                detail: The bearer token is missing or invalid.
                                status: 401
                                title: Unauthorized
                                type: about:blank
                "404":
                    description: 'not_found: Not Found response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ProblemDetails'
                            example:
                                detail: The requested DIP does not exist.
                                status: 404
                                title: Not Found
                                type: about:blank
                "500":
                    description: 'internal_server_error: Internal Server Error response.'
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ProblemDetails'
                            example:
                                detail: An error occurred when attempting to process the DIP request.
                                status: 500
                                title: Internal Server Error
                                type: about:blank
            security:
                - bearer_header_Authorization: []
components:
    schemas:
        CreateResponseBody:
            type: object
            properties:
                id:
                    type: string
                    description: The id field contains the identifier assigned to the DIP.
                    example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                    format: uuid
            example:
                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
            required:
                - id
        ProblemDetails:
            type: object
            properties:
                detail:
                    type: string
                    description: The detail field contains a human-readable explanation specific to this problem occurrence.
                    example: The request body is missing the docKey field.
                instance:
                    type: string
                    description: The instance field contains a URI reference that identifies this problem occurrence.
                status:
                    type: integer
                    description: The status field contains the HTTP status code generated by the origin server.
                    example: 400
                    format: int32
                title:
                    type: string
                    description: The title field contains a short, human-readable summary of the problem type.
                    example: Bad Request
                type:
                    type: string
                    description: The type field contains a URI reference that identifies the problem type.
                    default: about:blank
                    example: about:blank
                    format: uri
            description: ProblemDetails represents an RFC 9457 problem details object.
            example:
                detail: The request body is missing the docKey field.
                status: 400
                title: Bad Request
                type: about:blank
            required:
                - type
                - title
                - status
                - detail
        ShowResponseBody:
            type: object
            properties:
                completed_at:
                    type: string
                    description: The completed_at field contains the time when DIP processing completed.
                    example: "2026-05-27T15:04:05Z"
                    format: date-time
                created_at:
                    type: string
                    description: The created_at field contains the time when the DIP was requested.
                    example: "2026-05-27T15:04:05Z"
                    format: date-time
                docKey:
                    type: string
                    description: The docKey field contains the document key used to create the DIP.
                    example: CH-000001
                    minLength: 1
                id:
                    type: string
                    description: The id field uniquely identifies the DIP.
                    example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                    format: uuid
                object_key:
                    type: string
                    description: The object_key field contains the object store key for the completed DIP.
                    example: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                    minLength: 1
                started_at:
                    type: string
                    description: The started_at field contains the time when DIP processing started.
                    example: "2026-05-27T15:04:05Z"
                    format: date-time
                status:
                    type: string
                    description: The status field contains the current DIP status.
                    example: done
                    enum:
                        - queued
                        - in progress
                        - done
                        - failed
            example:
                completed_at: "2026-05-27T15:04:05Z"
                created_at: "2026-05-27T15:04:05Z"
                docKey: CH-000001
                id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                object_key: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                started_at: "2026-05-27T15:04:05Z"
                status: done
            required:
                - id
                - docKey
                - status
                - created_at
    securitySchemes:
        bearer_header_Authorization:
            type: http
            description: 'Authenticate with an access token supplied as Authorization: Bearer [token]. Clients obtain tokens from an external OIDC provider.'
            scheme: bearer
tags:
    - name: DIPs
      description: The DIPs service requests DIP creation and retrieves DIP details.
