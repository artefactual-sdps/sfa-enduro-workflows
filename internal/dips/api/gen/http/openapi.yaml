swagger: "2.0"
info:
    title: DIPs API
    description: API used to request DIP creation and poll DIP details.
    version: 0.1.0
host: localhost:80
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /dips:
        post:
            tags:
                - DIPs
            summary: create DIPs
            description: Request DIP creation for a document key.
            operationId: DIPs#create
            parameters:
                - name: object
                  in: body
                  required: true
                  schema:
                    type: object
                    properties:
                        docKey:
                            type: string
                            description: Document key used to create the DIP.
                            example: CH-000001
                            minLength: 1
            responses:
                "202":
                    description: Accepted response.
                    schema:
                        $ref: '#/definitions/CreateDIPResult'
                        required:
                            - id
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/DIPsCreateNotValidResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/DIPsCreateUnauthorizedResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/DIPsCreateInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
    /dips/{id}:
        get:
            tags:
                - DIPs
            summary: show DIPs
            description: Get DIP details.
            operationId: DIPs#show
            parameters:
                - name: id
                  in: path
                  description: DIP identifier.
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DIP'
                        required:
                            - id
                            - docKey
                            - status
                            - created_at
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/DIPsShowUnauthorizedResponseBody'
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/DIPsShowNotFoundResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/DIPsShowInternalErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
definitions:
    CreateDIPResult:
        title: CreateDIPResult
        type: object
        properties:
            id:
                type: string
                description: Identifier assigned to the DIP.
                example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                format: uuid
        example:
            id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
        required:
            - id
    DIP:
        title: DIP
        type: object
        properties:
            completed_at:
                type: string
                description: Time when DIP processing completed.
                example: "2026-05-27T15:04:05Z"
                format: date-time
            created_at:
                type: string
                description: Time when the DIP was requested.
                example: "2026-05-27T15:04:05Z"
                format: date-time
            docKey:
                type: string
                description: Document key used to create the DIP.
                example: CH-000001
                minLength: 1
            id:
                type: string
                description: DIP identifier.
                example: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
                format: uuid
            object_key:
                type: string
                description: Object store key for the completed DIP.
                example: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
                minLength: 1
            started_at:
                type: string
                description: Time when DIP processing started.
                example: "2026-05-27T15:04:05Z"
                format: date-time
            status:
                type: string
                description: Current DIP status.
                example: done
                enum:
                    - queued
                    - in progress
                    - done
                    - failed
        example:
            completed_at: "2026-05-27T15:04:05Z"
            created_at: "2026-05-27T15:04:05Z"
            docKey: CH-000001
            id: 3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb
            object_key: dips/3f38d6f4-7b19-4db8-8d7d-693b84a9a2fb.zip
            started_at: "2026-05-27T15:04:05Z"
            status: done
        required:
            - id
            - docKey
            - status
            - created_at
    DIPsCreateInternalErrorResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: true
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: Unexpected server error. (default view)
        example:
            fault: false
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: false
            timeout: true
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
