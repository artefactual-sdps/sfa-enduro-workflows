swagger: "2.0"
info:
    title: DIPs API
    description: The DIPs API is used to request DIP creation and retrieve DIP details.
    version: 0.2.0
host: localhost:80
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /dips:
        post:
            tags:
                - DIPs
            summary: create DIPs
            description: The create method requests DIP creation for the given document key.
            operationId: DIPs#create
            parameters:
                - name: object
                  in: body
                  required: true
                  schema:
                    type: object
                    properties:
                        docKey:
                            type: string
                            description: The docKey field contains the document key used to create the DIP.
                            example: CH-000001
                            minLength: 1
                        ignoreCache:
                            type: boolean
                            description: The ignoreCache field indicates whether to ignore a cached DIP previously created for this docKey. When ignoreCache is true, a new DIP is created for the given docKey even if a cached DIP exists. When ignoreCache is false or omitted, the ID of a cached DIP may be returned.
                            default: false
                            example: true
            responses:
                "202":
                    description: Accepted response.
                    schema:
                        $ref: '#/definitions/DIPsCreateResponseBody'
                        required:
                            - id
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/DIPsCreateBadRequestResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/DIPsCreateUnauthorizedResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/DIPsCreateInternalServerErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
    /dips/{id}:
        get:
            tags:
                - DIPs
            summary: show DIPs
            description: The show method retrieves DIP details.
            operationId: DIPs#show
            parameters:
                - name: id
                  in: path
                  description: DIPID uniquely identifies a DIP.
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DIPsShowResponseBody'
                        required:
                            - id
                            - docKey
                            - status
                            - created_at
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/DIPsShowBadRequestResponseBody'
                "401":
                    description: Unauthorized response.
                    schema:
                        $ref: '#/definitions/DIPsShowUnauthorizedResponseBody'
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/DIPsShowNotFoundResponseBody'
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/DIPsShowInternalServerErrorResponseBody'
            schemes:
                - http
            security:
                - bearer_header_Authorization: []
    /livez:
        get:
            tags:
                - DIPs
            summary: livez DIPs
            description: The livez method provides a simple check that the DIPs service is running and able to respond to requests. A successful response indicates that the service is running, but does not guarantee that it is able to process requests successfully.
            operationId: DIPs#livez
            responses:
                "200":
                    description: OK response.
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/DIPsLivezInternalServerErrorResponseBody'
            schemes:
                - http
            security: []
